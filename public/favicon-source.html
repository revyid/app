<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=512" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Google+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 512px;
      height: 512px;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
      <!-- Background gradient: M3 primary purple -->
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7965AF"/>
        <stop offset="50%" stop-color="#6750A4"/>
        <stop offset="100%" stop-color="#4F378B"/>
      </linearGradient>

      <!-- Subtle shine overlay -->
      <linearGradient id="shine" x1="20%" y1="0%" x2="80%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
        <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>

      <!-- Drop shadow -->
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#4F378B" flood-opacity="0.4"/>
      </filter>
    </defs>

    <!-- Background rounded square with shadow -->
    <g filter="url(#shadow)">
      <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
    </g>

    <!-- Shine overlay -->
    <rect width="512" height="512" rx="115" ry="115" fill="url(#shine)"/>

    <!-- Curly braces + R — monospace font, centered -->
    <text
      x="256"
      y="340"
      font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
      font-size="220"
      font-weight="500"
      fill="#FFFFFF"
      fill-opacity="0.96"
      text-anchor="middle"
      letter-spacing="2"
    >{ R }</text>

    <!-- Subtle inner border -->
    <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  </svg>
</body>
</html>
