<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6750A4"/>
      <stop offset="100%" stop-color="#9C7FD4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="128" ry="128" fill="url(#bg)"/>
  <!-- Inner highlight overlay -->
  <rect width="512" height="512" rx="128" ry="128" fill="url(#shine)"/>
  <!-- Letter R — centered -->
  <text
    x="256"
    y="370"
    font-family="'Google Sans', 'Inter', system-ui, sans-serif"
    font-size="300"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-8"
  >R</text>
</svg>